{% extends "base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-slate-900 rounded-2xl p-8 border border-slate-800">

        <h1 class="text-2xl font-bold mb-6 text-center">
            Login
        </h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="mb-4">
                    {% for message in messages %}
                        <div class="bg-red-500/10 border border-red-500 text-red-400 rounded-lg px-4 py-3">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="post" class="space-y-4">

            <div>
                <label class="block text-sm mb-2">
                    ログインID
                </label>
                <input
                    type="text"
                    name="username"
                    required
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3"
                >
            </div>

            <div>
                <label class="block text-sm mb-2">
                    パスワード
                </label>
                <input
                    type="password"
                    name="password"
                    required
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 rounded-lg py-3 font-medium"
            >
                ログイン
            </button>

        </form>

        <div class="mt-6 text-center">
            <a
                href="{{ url_for('register') }}"
                class="text-blue-400"
            >
                ユーザー登録
            </a>
        </div>

    </div>
</div>

{% endblock %}
